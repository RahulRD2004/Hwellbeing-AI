<script>
const API = "http://localhost:8000"

let sessionId = null
let recognition = null
let isListening = false
let currentAudio = null

const micBtn = document.getElementById("micButton")
const transcript = document.getElementById("liveTranscript")
const aiResponse = document.getElementById("aiResponse")
const status = document.getElementById("statusText")
const log = document.getElementById("conversationLog")

// 🎤 INIT SPEECH RECOGNITION
function initRecognition(){

    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition

    if(!SpeechRecognition){
        alert("Speech Recognition not supported in this browser")
        return
    }

    recognition = new SpeechRecognition()

    recognition.continuous = false
    recognition.interimResults = false

    recognition.onstart = () => {
        status.innerText = "Listening..."
        micBtn.classList.add("bg-red-500")
    }

    recognition.onresult = async (event) => {

        const text = event.results[0][0].transcript
        transcript.innerText = text

        addLog("You", text)

        stopListening()

        await processMessage(text)
    }

    recognition.onerror = (e) => {
        console.error("Speech error:", e)
        status.innerText = "Mic error. Try again."
        stopListening()
    }

    recognition.onend = () => {
        isListening = false
        micBtn.classList.remove("bg-red-500")
    }
}

// 🎤 START
function startListening(){

    if(!recognition) initRecognition()

    // stop audio if playing
    if(currentAudio){
        currentAudio.pause()
        currentAudio = null
    }

    try{
        recognition.start()
        isListening = true
    }catch{
        console.warn("Already listening")
    }
}

// 🎤 STOP
function stopListening(){
    if(recognition && isListening){
        recognition.stop()
    }
    isListening = false
}

// 🔁 PROCESS MESSAGE
async function processMessage(message){

    status.innerText = "Thinking..."

    try{

        const res = await fetch(API + "/voice-chat", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({
                message: message,
                session_id: sessionId
            })
        })

        const data = await res.json()

        sessionId = data.session_id

        updateAI(data.reply)
        addLog("HEALTHY", data.reply)

        // 🔊 PLAY AUDIO SAFELY
        if(data.audio_url){

            if(currentAudio){
                currentAudio.pause()
            }

            currentAudio = new Audio(data.audio_url)

            currentAudio.onended = () => {
                status.innerText = "Tap mic to continue"
            }

            currentAudio.onerror = () => {
                console.error("Audio failed")
                status.innerText = "Audio error"
            }

            await currentAudio.play()
        }

        // 🚨 RISK UI
        if(data.risk === "HIGH"){
            status.innerText = "⚠️ Seek medical attention"
        } else {
            status.innerText = "Tap mic to continue"
        }

    } catch(err){
        console.error(err)
        status.innerText = "Server error"
    }
}

// 🎤 CLICK HANDLER
micBtn.onclick = () => {
    if(!isListening) startListening()
    else stopListening()
}

// 💬 UPDATE AI
function updateAI(text){
    aiResponse.innerText = text
}

// 📜 ADD LOG
function addLog(role, text){

    const div = document.createElement("div")

    div.className = role === "You"
        ? "text-right text-blue-300"
        : "text-left text-green-300"

    div.innerText = role + ": " + text

    log.appendChild(div)

    log.scrollTop = log.scrollHeight
}
</script>
